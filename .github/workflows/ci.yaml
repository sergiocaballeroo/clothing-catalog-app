name: CI - Build & Push Images

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_API: ghcr.io/sergiocaballeroo/clothing-catalog-api
  IMAGE_WEB: ghcr.io/sergiocaballeroo/clothing-catalog-web

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      tag: ${{ steps.vars.outputs.TAG }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version tag
        id: vars
        run: echo "TAG=v$(cat VERSION | tr -d '[:space:]')" >> $GITHUB_OUTPUT

      - name: Build & push API
        uses: docker/build-push-action@v5
        with:
          context: ./api
          push: ${{ github.ref == 'refs/heads/main' }}
          tags: |
            ${{ env.IMAGE_API }}:${{ steps.vars.outputs.TAG }}
            ${{ env.IMAGE_API }}:latest
          build-args: |
            VERSION=${{ steps.vars.outputs.TAG }}

      - name: Build & push Web
        uses: docker/build-push-action@v5
        with:
          context: ./client
          push: ${{ github.ref == 'refs/heads/main' }}
          tags: |
            ${{ env.IMAGE_WEB }}:${{ steps.vars.outputs.TAG }}
            ${{ env.IMAGE_WEB }}:latest
          build-args: |
            VERSION=${{ steps.vars.outputs.TAG }}

  update-gitops:
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout gitops repo
        uses: actions/checkout@v4
        with:
          repository: sergiocaballeroo/clothing-catalog-gitops
          token: ${{ secrets.GITOPS_TOKEN }}
          path: gitops

      - name: Update image tags in me-dev overlay
        run: |
          TAG=${{ needs.build-and-push.outputs.tag }}
          cd gitops
          sed -i "s|newTag:.*# api|newTag: ${TAG} # api|" k8s/overlays/me-dev/kustomization.yaml
          sed -i "s|newTag:.*# web|newTag: ${TAG} # web|" k8s/overlays/me-dev/kustomization.yaml

      - name: Commit and push
        run: |
          TAG=${{ needs.build-and-push.outputs.tag }}
          cd gitops
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add k8s/overlays/me-dev/kustomization.yaml
          git commit -m "ci: update me-dev images to ${TAG}" || echo "No changes"
          git push
